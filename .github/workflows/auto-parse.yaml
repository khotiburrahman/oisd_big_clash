name: Update OISD Clash YAML

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Run parser script
      run: python parse.py

    - name: Commit and Push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # Paksa Git untuk mendeteksi perubahan file oisd_big.yaml
        git add -A oisd_big.yaml
        
        # Lakukan commit tanpa pengecekan diff yang ketat
        git commit -m "Update oisd_big.yaml berkala" || echo "Tidak ada perubahan baru"
        git push origin HEAD
