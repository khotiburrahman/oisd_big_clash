name: Update OISD Clash YAML

on:
  schedule:
    - cron: '0 0 * * *' # Berjalan otomatis setiap hari jam 12 malam UTC (07:00 WIB)
  workflow_dispatch: # Memungkinkan Anda menjalankan proses ini secara manual kapan saja

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        pip install tldextract

    - name: Run parser script
      run: python parse.py

    - name: Commit and Push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add oisd_big.yaml
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update oisd_big.yaml" && git push)
