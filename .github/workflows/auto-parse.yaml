name: Combine OISD and LoyalSoldier Reject to Clash YAML

on:
  schedule:
    - cron: '0 * * * *' # Berjalan otomatis setiap jam
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download, Combine, and Keep Original Domains (No Subdomain Truncation)
      run: |
        echo "Mengunduh data dari OISD Big dan LoyalSoldier Reject..."
        
        # 1. Unduh file mentah ke file sementara
        curl -sL -A "Mozilla/5.0" "https://raw.githubusercontent.com/sjhgvr/oisd/refs/heads/main/oisd_big.txt" > oisd_raw.txt
        curl -sL -A "Mozilla/5.0" "https://raw.githubusercontent.com/LoyalSoldier/clash-rules/release/reject.txt" > loyalsoldier_raw.txt

        # 2. Gabungkan data asli tanpa memotong subdomain, hanya hapus duplikat baris yang identik
        awk '
          {
            # Abaikan baris kosong, komentar, atau baris konfigurasi bawaan
            if ($0 ~ /^[[:space:]]*$/ || $0 ~ /^#/ || $0 ~ /^!/ || $0 ~ /^\[/ || $0 ~ /^-/) next
            
            # Ambil domain murni apa adanya (kolom pertama)
            domain = $1
            # Bersihkan tanda titik di awal atau akhir baris jika ada
            gsub(/^\.+|\.+$/, "", domain)
            
            if (domain ~ /\./) {
              total_input++
              if (domain in unique) {
                total_duplikat++
              } else {
                unique[domain] = 1
                total_unik++
              }
            }
          }

          END {
            print "payload:" > "oisd_big.yaml"
            PROCINFO["sorted_in"] = "@ind_str_asc"
            for (d in unique) {
              print "  - \047+." d "\047" >> "oisd_big.yaml"
            }
            
            print total_input > "stat_total.txt"
            print total_unik > "stat_unik.txt"
            print total_duplikat > "stat_duplikat.txt"
          }
        ' oisd_raw.txt loyalsoldier_raw.txt

    - name: Generate README.md
      run: |
        TOTAL_ALL=$(cat stat_total.txt)
        TOTAL_UNIK=$(cat stat_unik.txt)
        TOTAL_DUPLIKAT=$(cat stat_duplikat.txt)
        WAKTU_SEKARANG=$(date -u "+%Y-%m-%d %H:%M:%S")

        echo -e "# OISD Big & LoyalSoldier Reject Combined for Clash\n" > README.md
        echo -e "Repositori ini otomatis menggabungkan data asli **OISD Big** dan **LoyalSoldier Reject List** dengan akurasi domain 100% tanpa merusak subdomain asli.\n" >> README.md
        echo -e "### 📊 Statistik Pembaruan Terakhir" >> README.md
        echo -e "* **Waktu Pembaruan:** $WAKTU_SEKARANG UTC" >> README.md
        echo -e "* **Total Domain Mentah Diunduh:** $TOTAL_ALL domain" >> README.md
        echo -e "* **Total Domain Duplikat Identik Dibuang:** $TOTAL_DUPLIKAT domain" >> README.md
        echo -e "* **Total Aturan Unik Akhir di YAML:** **$TOTAL_UNIK domain**\n" >> README.md
        
        rm -f oisd_raw.txt loyalsoldier_raw.txt stat_total.txt stat_unik.txt stat_duplikat.txt

    - name: Commit and Push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add oisd_big.yaml README.md
        
        if git diff --staged --quiet; then
          echo "Tidak ada perubahan data dari kedua sumber. Memicu keepalive..."
          date +%s > keepalive.txt
          git add keepalive.txt
          git commit -m "Keepalive: Perpanjang masa tenggang"
        else
          git commit -m "Update oisd_big.yaml & README (Akurasi Domain Asli 100%)"
        fi
        
        git push origin HEAD
